<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>West House App</title>
    <link rel="canonical" href="https://westhouseenglishschool.com/" />
    
    <!-- PWA Meta tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f97316">
    <link rel="apple-touch-icon" href="img/icon-192.png">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CryptoJS (Hashing) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Chart.js (Dashboard) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- App Container -->
    <div id="app"></div>

    <!-- UI Components -->
    <div id="toast-container" class="toast-container"></div>
    <div id="global-loader" class="loader-overlay">
        <div class="loader"></div>
    </div>

    <!-- Core Scripts (Global Objects First) -->
    <script src="js/config.js"></script>
    <script src="js/db.js?v=3"></script>
    <script src="js/auth.js?v=3"></script>
    <script src="js/ui.js?v=3"></script>
    
    <!-- View Components (Depend on Core) -->
    <script src="js/views/dashboard.js?v=3"></script>
    <script src="js/views/users.js?v=3"></script>
    <script src="js/views/courses.js?v=3"></script>
    <script src="js/views/attendance.js?v=3"></script>
    <script src="js/views/payments.js?v=3"></script>
    <script src="js/views/materials.js?v=3"></script>
    <script src="js/views/calendar.js?v=3"></script>
    <script src="js/views/notifications.js?v=3"></script>
    <script src="js/views/about.js?v=3"></script>
    <script src="js/views/grades.js?v=3"></script>
    <script src="js/views/studentPortal.js?v=3"></script>

    <!-- Main Router and Bootstrapper (Init Everything) -->
    <script src="js/app.js?v=3"></script>
</body>
</html>
